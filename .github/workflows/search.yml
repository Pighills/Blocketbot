name: Blocket Volvo-bevakning

on:
  schedule:
    # 06:00 UTC ≈ 07:00-08:00 svensk tid (beroende på sommartid)
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install blocket-api beautifulsoup4 httpx

      - name: Run search
        run: python scripts/search.py

      - name: Commit and push results
        run: |
          git config user.name "blocket-bot"
          git config user.email "actions@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "Uppdaterade bevakningsresultat $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
